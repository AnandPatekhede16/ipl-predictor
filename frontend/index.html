<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IPL AI Predictor</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 30px;
    color: white;
}

.container {
    width: 500px;
    padding: 35px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
}

h1 {
    text-align: center;
    margin-bottom: 25px;
}

/* ✅ NEW: LOGO DISPLAY */
.team-logos {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
}

.team-logos img {
    width: 80px;
    height: 80px;
}

label {
    font-size: 14px;
    margin-top: 10px;
    display: block;
}

select {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border-radius: 10px;
    border: none;
    margin-bottom: 10px;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg, #ff512f, #dd2476);
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

#loading {
    margin-top: 10px;
    display: none;
    text-align: center;
    color: #ffd700;
}

#result {
    margin-top: 20px;
    font-size: 22px;
    text-align: center;
    color: #00ffcc;
}
</style>
</head>

<body>

<div class="container">
<h1>🏏 IPL AI Match Predictor</h1>

<!-- ✅ NEW: LOGOS SECTION -->
<div class="team-logos">
    <img id="batLogo" src="assets/mi.png">
    <img id="bowlLogo" src="assets/csk.png">
</div>

<form id="form">

<label>Batting Team</label>
<select id="batting_team" onchange="updateLogos()">
<option>Mumbai Indians</option>
<option>Chennai Super Kings</option>
<option>Royal Challengers Bangalore</option>
<option>Kolkata Knight Riders</option>
<option>Delhi Capitals</option>
<option>Sunrisers Hyderabad</option>
<option>Punjab Kings</option>
<option>Rajasthan Royals</option>
<option>Lucknow Super Giants</option>
<option>Gujarat Titans</option>
</select>

<label>Bowling Team</label>
<select id="bowling_team" onchange="updateLogos()">
<option>Mumbai Indians</option>
<option>Chennai Super Kings</option>
<option>Royal Challengers Bangalore</option>
<option>Kolkata Knight Riders</option>
<option>Delhi Capitals</option>
<option>Sunrisers Hyderabad</option>
<option>Punjab Kings</option>
<option>Rajasthan Royals</option>
<option>Lucknow Super Giants</option>
<option>Gujarat Titans</option>
</select>

<label>Venue</label>
<select id="venue">
<option>Wankhede Stadium</option>
<option>M Chinnaswamy Stadium</option>
<option>Eden Gardens</option>
<option>Arun Jaitley Stadium</option>
<option>MA Chidambaram Stadium</option>
<option>Rajiv Gandhi International Stadium</option>
<option>Sawai Mansingh Stadium</option>
<option>Punjab Cricket Association Stadium</option>
<option>Narendra Modi Stadium</option>
<option>Bharat Ratna Ekana Stadium</option>
</select>

<label>City</label>
<select id="city">
<option>Mumbai</option>
<option>Bangalore</option>
<option>Kolkata</option>
<option>Delhi</option>
<option>Chennai</option>
<option>Hyderabad</option>
<option>Jaipur</option>
<option>Mohali</option>
<option>Ahmedabad</option>
<option>Lucknow</option>
</select>

<label>Toss Winner</label>
<select id="toss_winner">
<option>Mumbai Indians</option>
<option>Chennai Super Kings</option>
<option>Royal Challengers Bangalore</option>
<option>Kolkata Knight Riders</option>
<option>Delhi Capitals</option>
<option>Sunrisers Hyderabad</option>
<option>Punjab Kings</option>
<option>Rajasthan Royals</option>
<option>Lucknow Super Giants</option>
<option>Gujarat Titans</option>
</select>

<label>Toss Decision</label>
<select id="toss_decision">
<option>bat</option>
<option>field</option>
</select>

<button type="submit">🚀 Predict Winner</button>

</form>

<div id="loading">⏳ Predicting...</div>
<div id="result"></div>

</div>

<script>

/* ✅ NEW: LOGO MAPPING */
const logos = {
    "Mumbai Indians": "assets/mi.png",
    "Chennai Super Kings": "assets/csk.png",
    "Royal Challengers Bangalore": "assets/rcb.png",
    "Kolkata Knight Riders": "assets/kkr.png",
    "Delhi Capitals": "assets/dc.png",
    "Sunrisers Hyderabad": "assets/srh.png",
    "Punjab Kings": "assets/pbks.png",
    "Rajasthan Royals": "assets/rr.png",
    "Lucknow Super Giants": "assets/lsg.png",
    "Gujarat Titans": "assets/gt.png"
};

/* ✅ NEW: UPDATE LOGOS */
function updateLogos() {
    const bat = document.getElementById("batting_team").value;
    const bowl = document.getElementById("bowling_team").value;

    document.getElementById("batLogo").src = logos[bat];
    document.getElementById("bowlLogo").src = logos[bowl];
}

/* ✅ INITIAL LOAD */
updateLogos();

document.getElementById("form").onsubmit = async function(e) {
    e.preventDefault();

    document.getElementById("loading").style.display = "block";
    document.getElementById("result").innerText = "";

    const data = {
        batting_team: document.getElementById("batting_team").value,
        bowling_team: document.getElementById("bowling_team").value,
        venue: document.getElementById("venue").value,
        city: document.getElementById("city").value,
        toss_winner: document.getElementById("toss_winner").value,
        toss_decision: document.getElementById("toss_decision").value
    };

    const response = await fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    const result = await response.json();

    document.getElementById("loading").style.display = "none";

    document.getElementById("result").innerText =
        "🏆 " + result.prediction + " (" + result.confidence + "% confidence)";
};
</script>

</body>
</html>
